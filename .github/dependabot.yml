version: 2

registries:
  github-nzbdav:
    type: nuget-feed
    url: https://nuget.pkg.github.com/nzbdav/index.json
    username: nzbdav
    password: ${{secrets.GH_PACKAGES_READ_TOKEN}}
  nuget-org:
    type: nuget-feed
    url: https://api.nuget.org/v3/index.json

updates:
  - package-ecosystem: nuget
    directory: /backend
    registries:
      - github-nzbdav
      - nuget-org
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "fix(deps)"
    groups:
      nuget-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # 0.49+ removed SevenZipArchive.Open; nzbdav also relies on reflection into SharpCompress internals.
      - dependency-name: "SharpCompress"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "fix(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "fix(deps)"
    groups:
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
        update-types:
          - minor
          - patch
      npm-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "react-router"
          - "@react-router/*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
